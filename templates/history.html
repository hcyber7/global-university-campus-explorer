<!DOCTYPE html>
<html>

<head>
    <title>Search History</title>
</head>

<body>

    <h1>Search History</h1>

    {% if history %}

        {% for search in history %}

            <div style="border:1px solid black; padding:15px; margin:10px;">

                <p><strong>{{ search.query }}</strong></p>

                <p>Results Found: {{ search.count }}</p>

                <p>Date: {{ search.date }}</p>

            </div>

        {% endfor %}

    {% else %}

        <h2>No search history available.</h2>

    {% endif %}

</body>
</html>
